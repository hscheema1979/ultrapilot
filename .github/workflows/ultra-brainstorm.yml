name: Ultra Brainstorm

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for brainstorming'
        required: true
        type: number

permissions:
  contents: read
  issues: write

jobs:
  brainstorm:
    name: Creative Exploration & Ideation
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'ultra-brainstorm') ||
      contains(github.event.issue.labels.*.name, 'brainstorm') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout UltraPilot
        uses: actions/checkout@v4

      - name: 💡 Brainstorming Session Initiated
        run: |
          echo "Creative exploration before implementation"
          echo "Explore user intent, requirements, design"
          echo "Generate multiple perspectives and ideas"

      - name: Execute Brainstorming
        run: |
          # Use before any creative work
          # Explores user intent, requirements and design
          # Generates diverse perspectives before implementation
          echo "Exploring requirements from multiple angles..."
          echo "Generating design alternatives..."

      - name: Update Issue Status
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;

            await github.rest.issues.addLabels({
              issueNumber: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ultra-brainstorm', 'ideation', 'in-progress']
            });

            await github.rest.issues.createComment({
              issueNumber: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 💡 Brainstorming Session Initiated

              **Purpose:** Creative exploration before implementation
              **Process:** Divergent thinking → Convergent selection
              **Output:** Design alternatives and recommendations

              ### Brainstorming Dimensions:
              1. 🎯 **User Intent:** What problem are we solving?
              2. 📋 **Requirements:** Functional and non-functional
              3. 🎨 **Design Alternatives:** Multiple approaches
              4. 🔍 **Trade-offs:** Pros and cons of each
              5. 💡 **Innovation:** Creative solutions

              ### Exploration Output:
              - 3-5 design alternatives
              - Trade-off analysis
              - Recommended approach with rationale
              - Risks and mitigation strategies

              Ideas will be documented here.

              ---
              *Triggered by [UltraPilot Brainstorm](https://github.com/hscheema1979/ultrapilot)*`
            });

name: Ultra Ralph

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for Ralph loop'
        required: true
        type: number

permissions:
  contents: read
  issues: write

jobs:
  ralph:
    name: Ralph Loop - Persistent Execution
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'ultra-ralph') ||
      contains(github.event.issue.labels.*.name, 'ralph') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout UltraPilot
        uses: actions/checkout@v4

      - name: 🪨 Ralph Loop Initiated
        run: |
          echo "The boulder never stops."
          echo ""
          echo "Issue: ${{ github.event.issue.number || github.event.inputs.issue_number }}"
          echo "Repository: ${{ github.repository }}"
          echo ""
          echo "Ralph will persist through errors until task completion."

      - name: Initialize Ralph Loop
        run: |
          # This would trigger the ultra-ralph skill
          # Ralph loops until task is done or fundamentally blocked
          echo "Initiating persistent execution loop..."
          echo "Each iteration will update this issue with progress."

      - name: Update Issue Status
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;

            await github.rest.issues.addLabels({
              issueNumber: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ultra-ralph', 'persistent-execution', 'in-progress']
            });

            await github.rest.issues.createComment({
              issueNumber: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🪨 Ralph Loop Initiated

              **Status:** Persistent execution active
              **Strategy:** Continue through errors until completion
              **Updates:** Each loop iteration will comment here

              > "The boulder never stops."

              ---
              *Triggered by [UltraPilot Ralph](https://github.com/hscheema1979/ultrapilot)*`
            });

name: Phase 4 - Multi-Perspective Validation

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for validation phase'
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validation:
    name: Multi-Perspective Code Review
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'phase:4') ||
      contains(github.event.issue.labels.*.name, 'validation') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout UltraPilot
        uses: actions/checkout@v4

      - name: 👁️ Phase 4 Validation Initiated
        run: |
          echo "Phase 4: Multi-Perspective Validation"
          echo "Parallel reviews: Security, Quality, Architecture"
          echo "Unanimous approval required"

      - name: Execute Multi-Perspective Validation
        run: |
          # Review orchestration: create validation PR
          # Review tracking: each reviewer reviews via PR or issue
          # Aggregation: summary issue with approval decisions
          # Labels: phase:4, review:security|quality|code
          echo "Launching parallel review perspectives..."
          echo "Security, Quality, Architecture reviews"

      - name: Update Issue Status
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;

            await github.rest.issues.addLabels({
              issueNumber: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['phase:4', 'validation', 'in-progress']
            });

            await github.rest.issues.createComment({
              issueNumber: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 👁️ Phase 4: Multi-Perspective Validation Initiated

              **Perspectives:** 3 parallel reviews
              **Requirement:** Unanimous approval
              **Duration:** Up to 3 review iterations

              ### Validation Perspectives:
              1. 🔒 **Security:** OWASP Top 10, auth, secrets
              2. ⚡ **Quality:** Performance, efficiency, patterns
              3. 🏗️ **Architecture:** Design, modularity, scalability

              ### Approval Process:
              - Each perspective reviews independently
              - Creates summary issue with decisions
              - All 3 must approve for completion
              - Max 3 iterations for requested changes

              Review results will be aggregated here.

              ---
              *Operations Playbook Phase 4*`
            });
